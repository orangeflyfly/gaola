<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>寶可夢加傲樂 V6.2 - 旗艦重裝機台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="coin-board">
        💰 <span id="coin-count">0</span> <button onclick="earnCoins()">打工</button>
        <button onclick="openBackpack()">🎒 背包</button>
    </div>

    <div id="selection-page">
        <h1>遊樂場大廳</h1>
        <div id="carousel-area">
            <div class="nav-arrow" onclick="changeMap(-1)">◀</div>
            <div id="single-map-display"></div>
            <div class="nav-arrow" onclick="changeMap(1)">▶</div>
        </div>
        <button class="arcade-btn-main" onclick="confirmMapSelection()" style="margin-top:40px;">投入 30<br>金幣開局</button>
        <button onclick="refreshMachine()" style="margin-top:20px; font-size:14px; opacity: 0.6;">刷新機台內容</button>
    </div>

    <div id="guaranteed-page" class="hidden">
        <h1 style="color:cyan">🎁 投幣獎勵：選擇一隻寶可夢</h1>
        <div id="guaranteed-choices"></div>
    </div>

    <div id="fighting-page" class="hidden">
        <div class="combatant" id="enemy-card">
            <img id="enemy-icon" class="poke-sprite" src="">
            <div class="card-info">
                <h2 id="enemy-name" style="margin:0;">敵方</h2>
                <div class="hp-info"><span>HP</span> <span id="enemy-hp-text">100/100</span></div>
                <div class="bar-bg"><div id="enemy-hp-bar" class="hp-bar" style="background:#f44336"></div></div>
            </div>
        </div>

        <div id="atb-track-container">
            <div class="track-bg">
                <div class="finish-line"></div>
                <div id="player-racer" style="position:absolute; top:10px;">
                    <img id="player-racer-img" src="" style="width:70px; border-radius:50%; border:3px solid white; background:#000;">
                </div>
                <div id="enemy-racer" style="position:absolute; top:10px;">
                    <img id="enemy-racer-img" src="" style="width:70px; border-radius:50%; border:3px solid white; background:#000;">
                </div>
            </div>
            <p id="action-msg">瘋狂按 A D 鍵加速！！</p>
        </div>

        <div class="combatant" id="player-card">
            <img id="player-icon" class="poke-sprite" src="">
            <div class="card-info">
                <h2 id="player-name" style="margin:0;">我方</h2>
                <div class="hp-info"><span>HP</span> <span id="player-hp-text">100/100</span></div>
                <div class="bar-bg"><div id="player-hp-bar-real" class="hp-bar"></div></div>
            </div>
        </div>
    </div>

    <div id="roulette-page" class="hidden">
        <h1 id="roulette-title">進入捕獲階段</h1>
        <div id="wheel-container">
            <div id="wheel-pointer"></div>
            <div id="wheel"></div>
        </div>
        <div id="roulette-result" class="hidden">
            <div id="result-ball" style="font-size: 100px;">🔴</div>
            <h2 id="result-msg">判定中...</h2>
            <div id="pay-confirm-box" class="hidden">
                <p id="pay-ask-text" style="font-size:20px;"></p>
                <button id="confirm-pay-btn" style="background:#4caf50; padding:15px 40px;">確認支付入包</button>
                <button onclick="finishCapture()" style="background:#f44336; padding:15px 40px; margin-left:10px;">放棄離開</button>
            </div>
            <button id="fail-exit-btn" class="hidden" onclick="finishCapture()">結束戰鬥</button>
        </div>
        <button id="stop-btn" onclick="spinWheel()" style="background:#ff5722; font-size:32px; padding:20px 60px; font-weight:900; border-radius:50px; border:5px solid white; cursor:pointer;">拍擊旋轉！</button>
    </div>

    <div id="extra-battle-pop" class="hidden">
        <div style="background:#000; border:4px solid #00bcd4; padding:40px; border-radius:30px; text-align:center; box-shadow:0 0 50px #00bcd4;">
            <h2 style="color:#00bcd4; font-size:36px;">⚡ 偵測到強大的氣息！ ⚡</h2>
            <p style="font-size:20px;">是否進行加賽？ (加賽場 6 星機率提升！)</p>
            <div style="margin-top:30px;">
                <button onclick="startExtraBattle()" style="background:#00bcd4; color:black; font-weight:bold; padding:15px 40px;">進行加賽</button>
                <button onclick="hideExtraPop()" style="background:#555; padding:15px 40px; margin-left:20px;">結束遊玩</button>
            </div>
        </div>
    </div>

    <div id="backpack-page" class="hidden">
        <h1>🎒 我的背包</h1>
        <button onclick="closeBackpack()" class="close-btn" style="margin-bottom:20px;">關閉背包</button>
        <div id="backpack-grid"></div> </div>

    <script src="pokemonData.js"></script>
    <script src="config.js"></script>
    <script src="storage.js"></script>
    <script src="SoundSystem.js"></script>
    <script src="ui.js"></script>
    <script src="MapSystem.js"></script>
    <script src="BattleSystem.js"></script>
    <script src="CaptureSystem.js"></script>
    <script src="game.js"></script>
</body>
</html>

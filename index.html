<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ga-Olé 開發實驗室</title>
    <style>
        body { background-color: #333; color: white; font-family: sans-serif; text-align: center; }
        
        /* 地圖容器 */
        #map-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 30px; 
            min-height: 200px; /* 確保沒東西時也有高度 */
        }
        
        .map-card {
            width: 120px; padding: 15px; border: 2px solid #aaa; border-radius: 10px;
            background-color: #444; transition: transform 0.2s; cursor: pointer;
        }
        .map-card:hover { transform: scale(1.1); border-color: yellow; }

        /* 剪影魔法 */
        .silhouette { filter: brightness(0); }
        
        .poke-sprite { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>機台地圖選擇</h1>
    
    <div id="map-container"></div>

    <br>
    <button onclick="refreshTest()" style="padding: 10px 20px; cursor: pointer;">
        刷新機台地圖 (投入硬幣)
    </button>

    <script>
        // 1. 卡池資料
        const machineInventory = [
            { id: 1, name: "小拉達", rarity: 1 },
            { id: 2, name: "波波", rarity: 1 },
            { id: 3, name: "皮卡丘", rarity: 3 },
            { id: 4, name: "水箭龜", rarity: 4 },
            { id: 5, name: "噴火龍", rarity: 4 },
            { id: 6, name: "超夢", rarity: 5 }
        ];

        // 2. 隨機抽 5 隻的邏輯
        function generateMaps() {
            let selectedPokemons = [];
            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * machineInventory.length);
                selectedPokemons.push(machineInventory[randomIndex]);
            }
            return selectedPokemons;
        }

        // 3. 把資料顯示在畫面上的邏輯
        function refreshTest() {
            const maps = generateMaps();
            // 抓取畫面上那個空的「容器」
            const container = document.getElementById('map-container');
            
            // 先清空裡面的舊東西
            container.innerHTML = ""; 
            
            // 把抽到的 5 隻變成 5 個卡片放進去
            maps.forEach((p, index) => {
                // 如果稀有度是 5，就加上 silhouette 這個 class 變黑影
                const shadowClass = (p.rarity >= 5) ? "silhouette" : "";
                
                container.innerHTML += `
                    <div class="map-card" onclick="alert('你選了地圖 ${index + 1}，遇到 ${p.name}！')">
                        <div class="poke-sprite ${shadowClass}">🐲</div>
                        <div>${p.name}</div>
                        <div style="font-size:12px; color:yellow;">★${p.rarity}</div>
                    </div>
                `;
            });
        }

        // 網頁一打開就先執行一次，讓畫面不留白
        window.onload = refreshTest;
    </script>
</body>
</html>

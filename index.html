<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>寶可夢加傲樂模擬機 - 階段四</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; overflow: hidden; }
        h1 { color: #ffeb3b; }
        .hidden { display: none !important; }

        /* 地圖與三選一容器 */
        #map-container, #battle-select-screen { display: flex; justify-content: center; gap: 15px; margin-top: 40px; }

        /* 卡片樣式 */
        .map-card {
            width: 130px; padding: 15px; background-color: #333; border: 3px solid #555;
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .map-card:hover { transform: scale(1.1); border-color: #ffeb3b; }
        .silhouette { filter: brightness(0); opacity: 0.8; }
        .poke-sprite { font-size: 50px; margin-bottom: 10px; }

        /* --- 戰鬥畫面專屬樣式 --- */
        #battle-stage { margin-top: 50px; }
        .energy-container {
            width: 400px; height: 30px; background: #444; border: 3px solid #fff;
            margin: 20px auto; border-radius: 15px; overflow: hidden;
        }
        #energy-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
            transition: width 0.1s ease-out;
        }
        .attack-hint { font-size: 24px; color: #ff5722; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="selection-page">
        <h1>請選擇目的地</h1>
        <div id="map-container"></div>
        <button onclick="initMachine()" style="margin-top:30px;">投入硬幣 (刷新)</button>
    </div>

    <div id="battle-page" class="hidden">
        <h1>發現寶可夢！挑戰哪一隻？</h1>
        <div id="battle-select-screen"></div>
    </div>

    <div id="fighting-page" class="hidden">
        <h1 id="enemy-title">對戰開始！</h1>
        <div class="poke-sprite" id="enemy-icon">🐲</div>
        <div class="attack-hint">瘋狂按 A 與 D 鍵集氣！！</div>
        
        <div class="energy-container">
            <div id="energy-bar"></div>
        </div>
        <p>能量值: <span id="energy-text">0</span>%</p>
    </div>

    <script>
        const machineInventory = [
            { id: 1, name: "小拉達", rarity: 1, icon: "🐭" },
            { id: 2, name: "波波", rarity: 1, icon: "🐦" },
            { id: 3, name: "皮卡丘", rarity: 3, icon: "⚡" },
            { id: 4, name: "噴火龍", rarity: 4, icon: "🔥" },
            { id: 5, name: "水箭龜", rarity: 4, icon: "🐢" },
            { id: 6, name: "超夢", rarity: 5, icon: "🔮" }
        ];

        let currentEnergy = 0;
        let isFighting = false;

        function initMachine() {
            const container = document.getElementById('map-container');
            container.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                const randomPoke = machineInventory[Math.floor(Math.random() * machineInventory.length)];
                const silhouette = (randomPoke.rarity >= 4) ? "silhouette" : "";
                container.innerHTML += `
                    <div class="map-card" onclick='enterMap(${JSON.stringify(randomPoke)})'>
                        <div class="poke-sprite ${silhouette}">${randomPoke.icon}</div>
                        <div>地圖 ${i+1}</div>
                        <div style="font-size:12px;color:#aaa;">${randomPoke.name}</div>
                    </div>`;
            }
        }

        function enterMap(boss) {
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('battle-page').classList.remove('hidden');
            let choices = [boss];
            while(choices.length < 3) {
                let r = machineInventory[Math.floor(Math.random() * machineInventory.length)];
                if(!choices.find(p => p.id === r.id)) choices.push(r);
            }
            const screen = document.getElementById('battle-select-screen');
            screen.innerHTML = "";
            choices.forEach(p => {
                screen.innerHTML += `
                    <div class="map-card" onclick="startFighting(${JSON.stringify(p)})">
                        <div class="poke-sprite">${p.icon}</div>
                        <div>${p.name}</div>
                    </div>`;
            });
        }

        // --- 第四課：連打戰鬥邏輯 ---
        function startFighting(target) {
            document.getElementById('battle-page').classList.add('hidden');
            document.getElementById('fighting-page').classList.remove('hidden');
            
            document.getElementById('enemy-title').innerText = "挑戰 " + target.name;
            document.getElementById('enemy-icon').innerText = target.icon;
            
            isFighting = true;
            currentEnergy = 0;
            
            // 啟動能量自動流失循環
            const loop = setInterval(() => {
                if (!isFighting) {
                    clearInterval(loop);
                    return;
                }
                if (currentEnergy > 0) currentEnergy -= 0.5; // 每 0.1 秒掉 0.5 能量
                updateUI();
            }, 100);
        }

        // 監聽鍵盤 A 和 D
        window.addEventListener('keydown', (e) => {
            if (!isFighting) return;
            
            if (e.key.toLowerCase() === 'a' || e.key.toLowerCase() === 'd') {
                currentEnergy += 3; // 每按一下加 3 能量
                if (currentEnergy >= 100) {
                    currentEnergy = 100;
                    winBattle();
                }
                updateUI();
            }
        });

        function updateUI() {
            const bar = document.getElementById('energy-bar');
            bar.style.width = currentEnergy + "%";
            document.getElementById('energy-text').innerText = Math.floor(currentEnergy);
        }

        function winBattle() {
            isFighting = false;
            alert("究極攻擊！成功捕捉！");
            location.reload(); // 重新整理回到開頭
        }

        window.onload = initMachine;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢加傲樂 - V3.0 視覺強化版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="coin-board">
        💰 <span id="coin-display">0</span>
        <button onclick="earnCoins()" style="background: #4caf50;">打工</button>
        <button onclick="openBackpack()" style="background: #2196f3;">🎒 背包</button>
    </div>

    <div id="selection-page">
        <h1>遊樂場大廳</h1>
        <p style="color: #aaa;">⬅ ➡ 切換地圖，Enter 確認進入</p>
        <div id="carousel-area">
            <div class="nav-arrow" onclick="changeMap(-1)">◀</div>
            <div id="single-map-display"></div>
            <div class="nav-arrow" onclick="changeMap(1)">▶</div>
        </div>
        <button onclick="confirmMapSelection()" class="btn-gold">投入 30 金幣探索 (Enter)</button>
        <button onclick="refreshMachine()" style="margin-top:10px;">刷新機台</button>
    </div>

    <div id="battle-page" class="hidden">
        <h1 style="color: #ff9800;">發現寶可夢！挑戰哪一隻？</h1>
        <div id="battle-select-screen"></div>
        <button onclick="backToMaps()" style="margin-top: 30px;">逃跑 (Esc)</button>
    </div>

    <div id="fighting-page" class="hidden">
        
        <div class="combatant" id="enemy-card" style="border-color: #f44336;">
            <img class="poke-sprite" id="enemy-icon" src="" alt="enemy">
            <h2 id="enemy-name" style="margin: 5px;">敵方</h2>
            <div class="bar-bg">
                <div id="enemy-hp-bar" class="hp-bar" style="background: #f44336;"></div>
            </div>
        </div>

        <div id="atb-track-container">
            <div class="track-bg">
                <div class="finish-line"></div>
                <div id="player-racer" class="racer-icon"><img id="player-racer-img" src=""></div>
                <div id="enemy-racer" class="racer-icon"><img id="enemy-racer-img" src=""></div>
            </div>
            <p id="action-msg" class="attack-hint blink-text">瘋狂按 A D 鍵加速！！</p>
        </div>

        <div class="combatant" id="player-card" style="border-color: #2196f3;">
            <img class="poke-sprite" id="player-icon" src="" alt="player">
            <h2 id="player-name" style="margin: 5px;">我方搭檔</h2>
            <div class="bar-bg">
                <div id="player-hp-bar-real" class="hp-bar"></div>
            </div>
        </div>
    </div>

    <div id="roulette-page" class="hidden">
        <h1 style="color: #ffeb3b;">進入捕獲階段！</h1>
        <h2 id="roulette-target-name">野生寶可夢</h2>
        
        <div id="wheel-container">
            <div id="wheel-pointer"></div>
            <div id="wheel"></div>
        </div>

        <div id="roulette-result" class="hidden">
            <div id="result-ball" style="font-size: 100px; margin-bottom: 10px;">🔴</div>
            <h2 id="result-msg" style="font-size: 28px;"></h2>
            <button onclick="finishCapture()" style="background: #2196f3;">確認收錄</button>
        </div>

        <button id="stop-btn" onclick="spinWheel()" style="background:#ff5722">點擊旋轉轉盤！</button>
    </div>

    <div id="backpack-page" class="hidden">
        <h1>🎒 我的圖鑑背包</h1>
        <p>收集進度: <span id="collection-count">0</span> 隻</p>
        <button onclick="closeBackpack()" style="background: #f44336;">返回大廳</button>
        <div id="backpack-grid"></div>
    </div>

    <script src="pokemonData.js"></script>
    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>寶可夢加傲樂模擬機 - 階段三</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #ffeb3b; }

        /* 地圖選單容器 */
        #map-container, #battle-select-screen {
            display: flex; justify-content: center; gap: 15px; margin-top: 40px;
        }

        /* 卡片樣式 */
        .map-card {
            width: 130px; padding: 15px; background-color: #333; border: 3px solid #555;
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .map-card:hover { transform: scale(1.1); border-color: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; }

        /* 剪影魔法 */
        .silhouette { filter: brightness(0); opacity: 0.8; }
        .poke-sprite { font-size: 50px; margin-bottom: 10px; }

        /* 隱藏區塊的 CSS */
        .hidden { display: none !important; }

        /* 三選一專用樣式 */
        .choice-card { border-color: #ff9800; background-color: #442200; }
    </style>
</head>
<body>

    <div id="selection-page">
        <h1>請選擇目的地</h1>
        <div id="map-container"></div>
        <button id="refresh-btn" onclick="initMachine()" style="margin-top:30px; padding:10px 20px;">投入硬幣 (刷新地圖)</button>
    </div>

    <div id="battle-page" class="hidden">
        <h1 style="color: #ff9800;">出現了三隻寶可夢！</h1>
        <p>點擊你想挑戰的對手</p>
        <div id="battle-select-screen"></div>
        <button onclick="backToMaps()" style="margin-top:30px; padding:10px 20px; background:#666; color:white; border:none;">回到地圖</button>
    </div>

    <script>
        const machineInventory = [
            { id: 1, name: "小拉達", rarity: 1, icon: "🐭" },
            { id: 2, name: "波波", rarity: 1, icon: "🐦" },
            { id: 3, name: "皮卡丘", rarity: 3, icon: "⚡" },
            { id: 4, name: "噴火龍", rarity: 4, icon: "🔥" },
            { id: 5, name: "水箭龜", rarity: 4, icon: "🐢" },
            { id: 6, name: "超夢", rarity: 5, icon: "🔮" }
        ];

        // 初始化地圖
        function initMachine() {
            const container = document.getElementById('map-container');
            container.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * machineInventory.length);
                const pokemon = machineInventory[randomIndex];
                createMapCard(pokemon, i + 1);
            }
        }

        function createMapCard(data, mapNumber) {
            const container = document.getElementById('map-container');
            const silhouetteClass = (data.rarity >= 4) ? "silhouette" : "";
            
            // 注意這裡：點擊改為執行 enterMap 函數，並把這隻怪的資料傳進去
            const cardHTML = `
                <div class="map-card" onclick='enterMap(${JSON.stringify(data)})'>
                    <div class="poke-sprite ${silhouetteClass}">${data.icon}</div>
                    <div style="font-weight: bold;">地圖 ${mapNumber}</div>
                    <div style="font-size: 14px; color: #aaa;">${data.name}</div>
                </div>
            `;
            container.innerHTML += cardHTML;
        }

        // --- 第三課核心：切換到三選一畫面 ---
        function enterMap(boss) {
            // 1. 切換顯示區域
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('battle-page').classList.remove('hidden');

            // 2. 準備三選一的清單 (原本那隻 + 兩隻隨機)
            let battleChoices = [boss];
            
            while (battleChoices.length < 3) {
                const randomIdx = Math.floor(Math.random() * machineInventory.length);
                const randomPoke = machineInventory[randomIdx];
                // 確保不會選到重複的 ID
                if (!battleChoices.find(p => p.id === randomPoke.id)) {
                    battleChoices.push(randomPoke);
                }
            }

            // 3. 渲染三張戰鬥卡片 (這裡我們就不做剪影了，讓玩家看清楚要打誰)
            const battleScreen = document.getElementById('battle-select-screen');
            battleScreen.innerHTML = "";
            battleChoices.forEach(p => {
                battleScreen.innerHTML += `
                    <div class="map-card choice-card" onclick="startBattle('${p.name}')">
                        <div class="poke-sprite">${p.icon}</div>
                        <div style="font-weight: bold;">${p.name}</div>
                        <div style="color: yellow;">★ ${p.rarity}</div>
                    </div>
                `;
            });
        }

        // 返回選單
        function backToMaps() {
            document.getElementById('selection-page').classList.remove('hidden');
            document.getElementById('battle-page').classList.add('hidden');
        }

        function startBattle(name) {
            alert("進入對戰！目標： " + name + "\n下一步：準備瘋狂連打 A / D 鍵！");
        }

        window.onload = initMachine;
    </script>
</body>
</html>
